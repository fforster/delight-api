<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELIGHT — Host Galaxy Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.min.css"/>
<style>
  :root {
    --bg-deep: #0a0e17;
    --bg-panel: #111827;
    --bg-input: #1a2236;
    --border: #263354;
    --border-focus: #4f7df5;
    --text: #c8d6e5;
    --text-dim: #5a6a82;
    --text-bright: #e8f0fc;
    --accent: #4f7df5;
    --accent-glow: rgba(79, 125, 245, 0.15);
    --success: #34d399;
    --error: #f87171;
    --warning: #fbbf24;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'Instrument Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Star field background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.35), transparent),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1.5px 1.5px at 25% 45%, rgba(200,220,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 65% 25%, rgba(200,220,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 80% 65%, rgba(200,220,255,0.35), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 1.5rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeIn 0.6s ease-out;
  }

  header h1 {
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 1.5rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 0.9rem;
    color: var(--text-dim);
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Config bar */
  .config-bar {
    display: flex;
    gap: 0.75rem;
    align-items: end;
    margin-bottom: 2rem;
    animation: fadeIn 0.6s ease-out 0.1s both;
  }

  .config-bar .field { flex: 1; }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  input, select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  input::placeholder { color: var(--text-dim); opacity: 0.6; }

  /* Input panel */
  .input-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    animation: fadeIn 0.6s ease-out 0.2s both;
  }

  .input-row {
    display: grid;
    grid-template-columns: 2fr 1.5fr 1.5fr auto;
    gap: 0.75rem;
    align-items: end;
  }

  button.submit-btn {
    padding: 0.6rem 1.5rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
    height: 38px;
  }

  button.submit-btn:hover { background: #3b6de0; }
  button.submit-btn:active { transform: scale(0.97); }

  button.submit-btn:disabled {
    background: var(--border);
    cursor: not-allowed;
  }

  /* Status */
  .status {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 0.6rem 0.9rem;
    border-radius: 6px;
    margin-bottom: 1.5rem;
    display: none;
    animation: fadeIn 0.3s ease-out;
  }

  .status.loading {
    display: block;
    background: var(--accent-glow);
    border: 1px solid rgba(79, 125, 245, 0.3);
    color: var(--accent);
  }

  .status.error {
    display: block;
    background: rgba(248, 113, 113, 0.1);
    border: 1px solid rgba(248, 113, 113, 0.3);
    color: var(--error);
  }

  .status.success {
    display: block;
    background: rgba(52, 211, 153, 0.08);
    border: 1px solid rgba(52, 211, 153, 0.25);
    color: var(--success);
  }

  /* Results */
  .results {
    animation: slideUp 0.4s ease-out;
  }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1rem;
  }

  .result-header h2 {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .result-header .oid-tag {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--accent);
    background: var(--accent-glow);
    padding: 0.25rem 0.7rem;
    border-radius: 4px;
  }

  /* Mean result card */
  .mean-card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.5rem;
  }

  .mean-card .stat-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.3rem;
  }

  .mean-card .stat-value {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text-bright);
  }

  /* Predictions table */
  .predictions-table {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 0.82rem;
  }

  thead th {
    background: var(--bg-input);
    padding: 0.7rem 1rem;
    text-align: left;
    font-weight: 400;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  tbody td {
    padding: 0.6rem 1rem;
    border-bottom: 1px solid rgba(38, 51, 84, 0.5);
    color: var(--text);
  }

  tbody tr:last-child td { border-bottom: none; }

  tbody tr:hover { background: rgba(79, 125, 245, 0.04); }

  td.idx {
    color: var(--text-dim);
    width: 3rem;
  }

  /* Copy button */
  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .input-row {
      grid-template-columns: 1fr;
    }
    .config-bar {
      flex-direction: column;
    }
    .mean-card {
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }
  }
</style>
</head>

  </header>

  <div class="config-bar">
    <div class="field" style="flex: 2;">
      <label>API Endpoint</label>
      <input type="text" id="apiUrl" value="http://localhost:8000" placeholder="http://host:port">
    </div>
    <div class="field" style="flex: 1;">
      <label>API Key</label>
      <input type="password" id="apiKey" value="" placeholder="your-key">
    </div>
  </div>

  <div class="input-panel">
    <div class="input-row">
      <div class="field">
        <label>Object ID</label>
        <input type="text" id="oid" value="ZTF19aawgxdn" placeholder="ZTF21example">
      </div>
      <div class="field">
        <label>RA (deg)</label>
        <input type="number" id="ra" step="any" value="247.7631879" placeholder="185.7289">
      </div>
      <div class="field">
        <label>Dec (deg)</label>
        <input type="number" id="dec" step="any" value="41.1539616" placeholder="15.8235">
      </div>
      <div>
        <button class="submit-btn" id="predictBtn" onclick="predict()">Predict</button>
      </div>
    </div>
  </div>

  <div class="status" id="status"></div>
  <div id="results"></div>
  <div id="aladin-container" style="display:none; margin-top: 1.5rem; animation: slideUp 0.4s ease-out;">
    <div class="result-header" style="margin-bottom: 1rem;">
      <h2 style="font-family: var(--font-mono); font-size: 0.8rem; font-weight: 400; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase;">Sky View</h2>
      <div style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-dim); display: flex; gap: 1.2rem;">
        <span><span style="color:#fbbf24;">✕</span> Transient</span>
        <span><span style="color:#4f7df5;">✕</span> Predictions</span>
        <span><span style="color:#34d399;">◯</span> Mean host</span>
      </div>
    </div>
    <div id="aladin-lite-div" style="width:100%; height:420px; border-radius:10px; overflow:hidden; border: 1px solid var(--border);"></div>
  </div>
</div>

<script>
async function predict() {
  const apiUrl = document.getElementById('apiUrl').value.replace(/\/+$/, '');
  const apiKey = document.getElementById('apiKey').value;
  const oid = document.getElementById('oid').value.trim();
  const ra = parseFloat(document.getElementById('ra').value);
  const dec = parseFloat(document.getElementById('dec').value);

  if (!oid || isNaN(ra) || isNaN(dec)) {
    showStatus('error', 'Please fill in all fields with valid values.');
    return;
  }

  const btn = document.getElementById('predictBtn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  showStatus('loading', 'Downloading PanSTARRS image and running DELIGHT');
  document.getElementById('results').innerHTML = '';

  try {
    const resp = await fetch(`${apiUrl}/predict`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': apiKey,
      },
      body: JSON.stringify({ oid, ra, dec }),
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }

    const data = await resp.json();
    showStatus('success', `Prediction complete for ${data.oid}`);
    renderResults(data);
  } catch (err) {
    showStatus('error', `${err.message}`);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Predict';
  }
}

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = `status ${type}`;
  if (type === 'loading') {
    el.innerHTML = `<span class="loading-dots">${msg}</span>`;
  } else {
    el.textContent = msg;
  }
}

function renderResults(data) {
  const preds = data.host_predictions;

  let tableRows = preds.map((p, i) =>
    `<tr>
      <td class="idx">${i}</td>
      <td>${p.ra.toFixed(7)}</td>
      <td>${p.dec.toFixed(7)}</td>
    </tr>`
  ).join('');

  document.getElementById('results').innerHTML = `
    <div class="results">
      <div class="result-header">
        <h2>Results</h2>
        <span class="oid-tag">${data.oid}</span>
      </div>

      <div class="mean-card">
        <div>
          <div class="stat-label">Mean RA</div>
          <div class="stat-value">${data.ra_mean.toFixed(7)}°</div>
        </div>
        <div>
          <div class="stat-label">Mean Dec</div>
          <div class="stat-value">${data.dec_mean.toFixed(7)}°</div>
        </div>
        <div>
          <div class="stat-label">Scatter</div>
          <div class="stat-value">${data.std_pixels.toFixed(3)} px</div>
        </div>
      </div>

      <div class="predictions-table">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>RA (deg)</th>
              <th>Dec (deg)</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>

      <div style="text-align: right; margin-top: 0.75rem;">
        <button class="copy-btn" onclick="copyJSON()">Copy JSON</button>
      </div>
    </div>
  `;

  window._lastResult = data;
  showAladin(data);
}

function copyJSON() {
  if (window._lastResult) {
    navigator.clipboard.writeText(JSON.stringify(window._lastResult, null, 2))
      .then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied';
        setTimeout(() => btn.textContent = 'Copy JSON', 1500);
      });
  }
}

// Submit on Enter from any input field
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') predict();
  });
});

// --- Aladin Lite ---
let _aladin = null;
let _predCat = null;
let _meanCat = null;
let _inputCat = null;

function showAladin(data) {
  document.getElementById('aladin-container').style.display = 'block';

  const ra = data.ra_mean;
  const dec = data.dec_mean;

  if (_aladin === null) {
    A.init.then(() => {
      _aladin = A.aladin('#aladin-lite-div', {
        survey: 'P/PanSTARRS/DR1/color',
        fov: 0.05,
        target: `${ra} ${dec}`,
        showReticle: false,
        showCooGrid: false,
      });

      _inputCat = A.catalog({name: 'Transient', shape: 'cross', color: '#fbbf24', sourceSize: 22});
      _predCat  = A.catalog({name: 'Predictions', shape: 'cross', color: '#4f7df5', sourceSize: 16});
      _meanCat  = A.catalog({name: 'Mean host', shape: 'circle', color: '#34d399', sourceSize: 18});

      _aladin.addCatalog(_inputCat);
      _aladin.addCatalog(_predCat);
      _aladin.addCatalog(_meanCat);

      populateAladinSources(data);
    });
  } else {
    _aladin.gotoRaDec(ra, dec);
    _inputCat.removeAll();
    _predCat.removeAll();
    _meanCat.removeAll();
    populateAladinSources(data);
  }
}

function populateAladinSources(data) {
  _inputCat.addSources([A.source(data.ra_input, data.dec_input, {name: 'Transient ' + data.oid})]);
  data.host_predictions.forEach((p, i) => {
    _predCat.addSources([A.source(p.ra, p.dec, {name: 'Prediction ' + i})]);
  });
  _meanCat.addSources([A.source(data.ra_mean, data.dec_mean, {name: 'Mean host'})]);
}
</script>
<script type="text/javascript" src="https://aladin.cds.unistra.fr/AladinLite/api/v3/latest/aladin.js" charset="utf-8"></script>
</body>
</html>
